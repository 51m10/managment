name: Build Flet APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flet openpyxl pymupdf

      - name: Build APK
        run: |
          cd src
          flet build apk --yes
          # دستور زیر محتویات پوشه build را لیست می‌کند تا مسیر دقیق را ببینیم
          find . -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: src/build/apk/ # یا هر مسیری که در خروجی مرحله قبل می‌بینید
          if-no-files-found: warn
