name: Build Flet APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flet openpyxl pymupdf

      - name: Prepare build environment
        run: |
          mkdir -p temp_build
          cp FactoryDocApp/main.py temp_build/
          # اگر فایل‌های دیگری مثل flet.toml دارید، اینجا کپی کنید
          # cp FactoryDocApp/flet.toml temp_build/ 

      - name: Build APK
        run: |
          cd temp_build
          flet build apk main.py --yes
